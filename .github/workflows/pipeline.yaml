name: github-pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: set up node js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          
      - name: Install dependencies
        run: npm install
        
      - name: run test
        run: npm run test
